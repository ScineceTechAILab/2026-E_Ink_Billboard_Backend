server:
  port: 8083

spring:
  # 生产环境通常不需要导入额外的本地配置文件，配置应通过环境变量注入
  # config:
  #   import: classpath:prod-config.yml
  
  # 1. 数据库连接配置
  datasource:
    url: jdbc:postgresql://${myip}:5432/postgres?currentSchema=public
    username: root
    password: ${pwd}
    driver-class-name: org.postgresql.Driver
    # HikariCP连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1500000
      idle-timeout: 600000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${myip}
      port: 6379
      password: ${redis_password}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 200ms
      connect-timeout: 5000ms

# 上传限制配置
upload:
  daily-limit:
    image: 20
    video: 5

# wx小程序开发
wechat:
  appid: ${wechat_appid}
  secret: ${wechat_secret}

# wx公众号开发
wx:
  mp:
    appId: ${wx_mp_appid}
    secret: ${wx_mp_secret}
    token: ${wx_mp_token}
    aes-key: ${wx_mp_aes_key}

feishu:
  app-id: ${feishu_app_id}
  app-secret: ${feishu_app_secret}
  oauth-authorize-url: https://open.feishu.cn/open-apis/authen/v1/authorize
  oauth-token-url: https://open.feishu.cn/open-apis/authen/v2/oauth/token
  user-info-url: https://open.feishu.cn/open-apis/authen/v1/user_info
  # 生产环境回调地址 (指向云端服务器IP)
  redirect-uri: http://${myip}/feishu/callback

jwt:
  secret: ${jwt_secret}
  expiration: 604800000
  header: Authorization

minio:
  endpoint: http://${myip}:9000
  access-key: ${minio_access_key}
  secret-key: ${minio_secret_key}
  bucket-name: eink-images
  use-presigned-url: true
  presigned-url-expiry-hours: 2

mqtt:
  broker-url: tcp://${myip}:1883
  username: ${emqx_username}
  password: ${emqx_password}
  client-id: eink-backend-${random.value}
  qos: 1

# 播放队列配置
play-queue:
  visitor-play-duration: 120
  admin-play-duration: 0
  visitor-daily-limit: 5
  poll-interval: 30
  switch-ahead-time: 10

logging:
  level:
    root: info
    com.stalab.e_ink_billboard_backend: info
