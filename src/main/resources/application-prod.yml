server:
  port: 8083

spring:
  # 数据库连接配置 - 使用环境变量
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/postgres?currentSchema=public&useSSL=false
    username: ${POSTGRES_USER:root}
    password: ${POSTGRES_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1500000
      idle-timeout: 600000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_password123}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 200ms
      connect-timeout: 5000ms

# 上传限制配置
upload:
  daily-limit:
    image: 20
    video: 5

# wx小程序开发
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

# wx公众号开发
wx:
  mp:
    appId: ${WX_MP_APPID:}
    secret: ${WX_MP_SECRET:}
    token: ${WX_MP_TOKEN:}
    aes-key: ${WX_MP_AES_KEY:}

feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  oauth-authorize-url: https://open.feishu.cn/open-apis/authen/v1/authorize
  oauth-token-url: https://open.feishu.cn/open-apis/authen/v2/oauth/token
  user-info-url: https://open.feishu.cn/open-apis/authen/v1/user_info
  redirect-uri: http://${SERVER_IP:localhost}/feishu/callback

jwt:
  secret: ${JWT_SECRET:MySuperSecretKeyForEInkSystem2026}
  expiration: 604800000
  header: Authorization

minio:
  # 外部访问地址（用于生成返回给前端的 URL）
  endpoint: ${MINIO_ENDPOINT:http://${SERVER_IP:localhost}:9000}
  # 内部连接地址（用于后端连接 MinIO，如果是容器部署则使用容器名）
  internal-endpoint: ${MINIO_INTERNAL_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minio_password123}
  bucket-name: ${MINIO_BUCKET_NAME:eink-images}
  use-presigned-url: ${MINIO_USE_PRESIGNED_URL:true}
  presigned-url-expiry-hours: ${MINIO_PRESIGNED_URL_EXPIRY_HOURS:2}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://${SERVER_IP:localhost}:1883}
  username: ${EMQX_USERNAME:admin}
  password: ${EMQX_PASSWORD:emqx_password123}
  client-id: eink-backend-${random.value}
  qos: 1

# 播放队列配置
play-queue:
  visitor-play-duration: 120
  admin-play-duration: 0
  visitor-daily-limit: 5
  poll-interval: 30
  switch-ahead-time: 10

logging:
  level:
    root: info
    com.stalab.e_ink_billboard_backend: debug
