version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/pgvector:pg17
    container_name: eink-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - eink-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/redis:6.2
    container_name: eink-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - eink-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: eink-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_password123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9002:9001"   # Console Web UI
    networks:
      - eink-net

  # MinIO 初始化 - 创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: eink-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minio_password123};
      mc mb local/eink-images --ignore-existing;
      echo 'Bucket eink-images created or already exists';
      exit 0;
      "
    networks:
      - eink-net
    restart: "no"

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.3.2
    container_name: eink-emqx
    restart: always
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-emqx_password123}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # HTTP API
      - "18083:18083"  # Dashboard
    networks:
      - eink-net
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eink-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 使用容器名进行服务发现
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password123}
      # MinIO 配置 - 使用容器名
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password123}
      MINIO_BUCKET_NAME: eink-images
      # MQTT 配置 - 使用容器名
      MQTT_BROKER_URL: tcp://emqx:1883
      MQTT_USERNAME: ${EMQX_USERNAME:-admin}
      MQTT_PASSWORD: ${EMQX_PASSWORD:-emqx_password123}
      # 其他配置
      JWT_SECRET: ${JWT_SECRET:-MySuperSecretKeyForEInkSystem2026}
      MYIP: ${SERVER_IP:-localhost}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WX_MP_APPID: ${WX_MP_APPID:-}
      WX_MP_SECRET: ${WX_MP_SECRET:-}
      WX_MP_TOKEN: ${WX_MP_TOKEN:-}
      WX_MP_AES_KEY: ${WX_MP_AES_KEY:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
    ports:
      - "8081:8083"
    networks:
      - eink-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      emqx:
        condition: service_healthy

  # 前端应用
  frontend:
    build:
      context: ./feishu-admin
      dockerfile: Dockerfile
    container_name: eink-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - eink-net
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  emqx_data:
  emqx_log:

networks:
  eink-net:
    driver: bridge
