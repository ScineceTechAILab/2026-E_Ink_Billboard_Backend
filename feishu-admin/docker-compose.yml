version: '3.8'

services:
  feishu-admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feishu-admin-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - feishu-admin-network

networks:
  feishu-admin-network:
    driver: bridge
